services:

  db:
    image: postgres:15
    container_name: postgres_db_ex12
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  etl:
    build: .
    container_name: etl_app
    depends_on:
      - db
    volumes:
      - .:/app
    working_dir: /app
    command: python app/main.py

  report:
    image: python:3.11-slim
    container_name: report_generator
    depends_on:
      - db
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install psycopg2-binary && python reports/report.py"

  backup:
    image: postgres:15
    container_name: db_backup
    depends_on:
      - db
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: postgres
    command: >
      bash -c "sleep 20 &&
      pg_dump -h db -U postgres analytics > /backups/backup.sql &&
      echo Backup done"

volumes:
  db_data:

