version: "3.8"

services:
  db:
    image: postgres:15
    container_name: postgres_db_ex6
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"

  python-app:
    build: ./python-app
    container_name: python_generator_ex6
    depends_on:
      - db
