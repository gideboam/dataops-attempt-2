version: "3.9"

services:

  db:
    image: postgres:13
    container_name: postgres_db_ex12
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exercise12_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: etl_app
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: exercise12_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
